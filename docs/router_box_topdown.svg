<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1900" viewBox="0 0 2400 1900">
  <defs>
    <style>
      .title { font: 700 36px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #374151; }
      .section { font: 700 26px Arial, sans-serif; fill: #111827; }
      .label { font: 700 22px Arial, sans-serif; fill: #111827; }
      .pin { font: 400 19px Arial, sans-serif; fill: #1f2937; }
      .small { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .noteText { font: 400 20px Arial, sans-serif; fill: #1f2937; }
      .outer { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .device { fill: #ffffff; stroke: #0f172a; stroke-width: 3; rx: 16; ry: 16; }
      .wago { fill: #eff6ff; stroke: #2563eb; stroke-width: 3; rx: 16; ry: 16; }
      .support { fill: #fffbeb; stroke: #d97706; stroke-width: 2.5; rx: 14; ry: 14; }
      .legendBox { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2.5; rx: 14; ry: 14; }
      .wireP { stroke: #b91c1c; stroke-width: 5; fill: none; }
      .wireG { stroke: #1f2937; stroke-width: 5; fill: none; }
      .wireC { stroke: #059669; stroke-width: 4.5; fill: none; }
      .wireI { stroke: #7c3aed; stroke-width: 4.5; fill: none; }
      .bus5 { stroke: #dc2626; stroke-width: 8; fill: none; }
      .busg { stroke: #111827; stroke-width: 8; fill: none; }
      .dash { stroke-dasharray: 12 10; }
      .jP { fill: #b91c1c; }
      .jG { fill: #111827; }
      .jC { fill: #059669; }
      .jI { fill: #7c3aed; }
    </style>
  </defs>

  <rect x="0" y="0" width="2400" height="1900" fill="#f1f5f9"/>

  <text x="60" y="60" class="title">Router Box Top-Down Wiring Picture</text>
  <text x="60" y="96" class="subtitle">Red = positive power, black = ground, green = 3V3 / 1-wire / relay control, purple = I2C.</text>

  <rect x="50" y="120" width="2280" height="90" class="legendBox"/>
  <text x="75" y="156" class="label">Capacitor rule</text>
  <text x="75" y="190" class="noteText">Both the 470uF capacitor and the 0.1uF capacitor connect across the 5V and GND rails in parallel. They do not go inline with the 5V feed.</text>

  <rect x="50" y="245" width="2280" height="280" class="outer"/>
  <text x="75" y="285" class="section">A. High-current switched router power path</text>

  <rect x="90" y="330" width="270" height="145" class="device"/>
  <text x="120" y="375" class="label">Battery / DC Source</text>
  <text x="120" y="415" class="pin">SRC+</text>
  <text x="120" y="448" class="pin">SRC-</text>

  <rect x="540" y="320" width="330" height="165" class="device"/>
  <text x="570" y="365" class="label">INA219 Module</text>
  <text x="570" y="405" class="pin">VIN+ from source positive</text>
  <text x="570" y="438" class="pin">VIN- to relay COM</text>
  <text x="570" y="471" class="pin">VCC / GND / SDA / SCL</text>

  <rect x="1040" y="320" width="290" height="165" class="device"/>
  <text x="1070" y="365" class="label">Relay Module</text>
  <text x="1070" y="405" class="pin">COM from INA219 VIN-</text>
  <text x="1070" y="438" class="pin">NO to Router+</text>
  <text x="1070" y="471" class="pin">IN / VCC / GND</text>

  <rect x="1500" y="330" width="270" height="145" class="device"/>
  <text x="1530" y="375" class="label">Router</text>
  <text x="1530" y="415" class="pin">Router+</text>
  <text x="1530" y="448" class="pin">Router-</text>

  <line x1="360" y1="398" x2="540" y2="398" class="wireP"/>
  <line x1="870" y1="431" x2="1040" y2="431" class="wireP"/>
  <line x1="1330" y1="431" x2="1500" y2="431" class="wireP"/>
  <line x1="360" y1="455" x2="1500" y2="455" class="wireG"/>
  <text x="395" y="388" class="small">SRC+ to INA219 VIN+</text>
  <text x="895" y="420" class="small">INA219 VIN- to Relay COM</text>
  <text x="1360" y="420" class="small">Relay NO to Router+</text>
  <text x="800" y="483" class="small">SRC- directly to Router-</text>

  <rect x="50" y="560" width="2280" height="380" class="outer"/>
  <text x="75" y="600" class="section">B. 5V regulator and power distribution</text>

  <rect x="90" y="650" width="360" height="190" class="device"/>
  <text x="120" y="695" class="label">12/24V to 5V Regulator</text>
  <text x="120" y="738" class="pin">IN+ / IN- from source</text>
  <text x="120" y="773" class="pin">5V OUT to 5V rail</text>
  <text x="120" y="808" class="pin">GND OUT to GND rail</text>

  <rect x="600" y="635" width="500" height="260" class="wago"/>
  <text x="630" y="682" class="label">Wago Power Distribution</text>
  <text x="630" y="720" class="pin">Upper rail: 5V bus</text>
  <text x="630" y="755" class="pin">Lower rail: GND bus</text>
  <line x1="665" y1="800" x2="1040" y2="800" class="bus5"/>
  <line x1="665" y1="850" x2="1040" y2="850" class="busg"/>
  <text x="1060" y="808" class="small">5V</text>
  <text x="1060" y="858" class="small">GND</text>

  <rect x="1240" y="640" width="320" height="200" class="device"/>
  <text x="1270" y="685" class="label">XIAO ESP32C3 Power</text>
  <text x="1270" y="728" class="pin">5V/VIN from 5V rail</text>
  <text x="1270" y="763" class="pin">GND from GND rail</text>
  <text x="1270" y="798" class="pin">3V3 generated on-board</text>

  <rect x="1700" y="640" width="290" height="180" class="device"/>
  <text x="1730" y="685" class="label">Relay Power Pins</text>
  <text x="1730" y="728" class="pin">VCC from 5V rail</text>
  <text x="1730" y="763" class="pin">GND from GND rail</text>

  <rect x="2060" y="620" width="220" height="110" class="support"/>
  <text x="2085" y="665" class="label">470uF Cap</text>
  <text x="2085" y="700" class="pin">+ to 5V, - to GND</text>

  <rect x="2060" y="770" width="220" height="110" class="support"/>
  <text x="2085" y="815" class="label">0.1uF Cap</text>
  <text x="2085" y="850" class="pin">across 5V and GND</text>

  <line x1="360" y1="398" x2="360" y2="620" class="wireP"/>
  <line x1="360" y1="620" x2="270" y2="620" class="wireP"/>
  <line x1="270" y1="620" x2="270" y2="650" class="wireP"/>
  <line x1="360" y1="455" x2="310" y2="455" class="wireG"/>
  <line x1="310" y1="455" x2="310" y2="650" class="wireG"/>

  <line x1="450" y1="773" x2="600" y2="773" class="wireP"/>
  <line x1="450" y1="808" x2="600" y2="808" class="wireG"/>
  <line x1="1100" y1="800" x2="1240" y2="800" class="wireP"/>
  <line x1="1100" y1="850" x2="1240" y2="850" class="wireG"/>
  <line x1="1100" y1="800" x2="1700" y2="800" class="wireP"/>
  <line x1="1100" y1="850" x2="1700" y2="850" class="wireG"/>
  <line x1="1990" y1="800" x2="2060" y2="800" class="wireP"/>
  <line x1="1990" y1="850" x2="2060" y2="850" class="wireG"/>
  <line x1="2170" y1="730" x2="2170" y2="800" class="wireP"/>
  <line x1="2170" y1="730" x2="2170" y2="850" class="wireG dash"/>
  <line x1="2170" y1="880" x2="2170" y2="800" class="wireP"/>
  <line x1="2170" y1="880" x2="2170" y2="850" class="wireG dash"/>
  <text x="1830" y="905" class="small">Both capacitors bridge across the same two rails</text>

  <rect x="50" y="975" width="2280" height="830" class="outer"/>
  <text x="75" y="1015" class="section">C. Logic, sensors, and signal wiring</text>
  <text x="75" y="1050" class="small">This section is drawn as horizontal signal rails with short branch drops so labels do not overlap the wires.</text>

  <rect x="90" y="1100" width="340" height="260" class="device"/>
  <text x="120" y="1145" class="label">XIAO Signal Pins</text>
  <text x="120" y="1190" class="pin">3V3 out</text>
  <text x="120" y="1230" class="pin">GPIO2 -> 1WIRE DATA</text>
  <text x="120" y="1270" class="pin">GPIO3 -> Relay IN</text>
  <text x="120" y="1310" class="pin">GPIO6 -> INA219 SDA</text>
  <text x="120" y="1350" class="pin">GPIO7 -> INA219 SCL</text>

  <rect x="540" y="1090" width="420" height="280" class="wago"/>
  <text x="570" y="1135" class="label">Sensor / Logic Wago Block</text>
  <text x="570" y="1180" class="pin">Three separate landing rows:</text>
  <text x="600" y="1220" class="pin">3V3 row</text>
  <text x="600" y="1260" class="pin">DATA row</text>
  <text x="600" y="1300" class="pin">GND row</text>
  <text x="570" y="1340" class="pin">4.7k resistor from 3V3 row to DATA row</text>

  <rect x="1110" y="1105" width="320" height="220" class="device"/>
  <text x="1140" y="1150" class="label">INA219 Logic Pins</text>
  <text x="1140" y="1195" class="pin">VCC from 3V3</text>
  <text x="1140" y="1235" class="pin">SDA from GPIO6</text>
  <text x="1140" y="1275" class="pin">SCL from GPIO7</text>

  <rect x="1600" y="1095" width="260" height="220" class="device"/>
  <text x="1630" y="1140" class="label">DS18B20 Probe #1</text>
  <text x="1630" y="1185" class="pin">VDD from 3V3 row</text>
  <text x="1630" y="1225" class="pin">DATA from DATA row</text>
  <text x="1630" y="1265" class="pin">GND from GND row</text>

  <rect x="1600" y="1435" width="260" height="220" class="device"/>
  <text x="1630" y="1480" class="label">DS18B20 Probe #2</text>
  <text x="1630" y="1525" class="pin">VDD from 3V3 row</text>
  <text x="1630" y="1565" class="pin">DATA from DATA row</text>
  <text x="1630" y="1605" class="pin">GND from GND row</text>

  <rect x="1980" y="1125" width="260" height="120" class="device"/>
  <text x="2010" y="1170" class="label">Relay Control</text>
  <text x="2010" y="1210" class="pin">IN from XIAO GPIO3</text>

  <text x="520" y="1450" class="label">Signal rails</text>
  <line x1="430" y1="1455" x2="2140" y2="1455" class="wireC"/>
  <text x="2160" y="1462" class="small">3V3 rail</text>

  <line x1="430" y1="1515" x2="2140" y2="1515" class="wireC"/>
  <text x="2160" y="1522" class="small">1WIRE DATA rail</text>

  <line x1="430" y1="1575" x2="2140" y2="1575" class="wireG"/>
  <text x="2160" y="1582" class="small">GND rail</text>

  <line x1="430" y1="1635" x2="1460" y2="1635" class="wireI"/>
  <text x="1480" y="1642" class="small">GPIO6 -> INA219 SDA rail</text>

  <line x1="430" y1="1695" x2="1460" y2="1695" class="wireI"/>
  <text x="1480" y="1702" class="small">GPIO7 -> INA219 SCL rail</text>

  <line x1="430" y1="1755" x2="2140" y2="1755" class="wireC dash"/>
  <text x="2160" y="1762" class="small">GPIO3 -> Relay IN path</text>

  <line x1="430" y1="1190" x2="430" y2="1455" class="wireC"/>
  <line x1="430" y1="1230" x2="430" y2="1515" class="wireC"/>
  <line x1="430" y1="1270" x2="430" y2="1755" class="wireC dash"/>
  <line x1="430" y1="1310" x2="430" y2="1635" class="wireI"/>
  <line x1="430" y1="1350" x2="430" y2="1695" class="wireI"/>

  <line x1="750" y1="1220" x2="750" y2="1455" class="wireC"/>
  <line x1="750" y1="1260" x2="750" y2="1515" class="wireC"/>
  <line x1="750" y1="1300" x2="750" y2="1575" class="wireG"/>
  <line x1="720" y1="1220" x2="720" y2="1260" class="wireC"/>
  <text x="610" y="1395" class="small">4.7k pull-up from 3V3 row to DATA row</text>

  <line x1="1240" y1="1195" x2="1240" y2="1455" class="wireC"/>
  <line x1="1240" y1="1235" x2="1240" y2="1635" class="wireI"/>
  <line x1="1240" y1="1275" x2="1240" y2="1695" class="wireI"/>

  <line x1="1730" y1="1185" x2="1730" y2="1455" class="wireC"/>
  <line x1="1730" y1="1225" x2="1730" y2="1515" class="wireC"/>
  <line x1="1730" y1="1265" x2="1730" y2="1575" class="wireG"/>

  <line x1="1730" y1="1525" x2="1730" y2="1455" class="wireC"/>
  <line x1="1730" y1="1565" x2="1730" y2="1515" class="wireC"/>
  <line x1="1730" y1="1605" x2="1730" y2="1575" class="wireG"/>

  <line x1="2110" y1="1210" x2="2110" y2="1755" class="wireC dash"/>

  <rect x="70" y="1815" width="2260" height="55" class="legendBox"/>
  <text x="95" y="1850" class="noteText">Bench-build rule: make three real terminal groups for section C and keep them separate: one 3V3 group, one DATA group, one GND group. Then branch both DS18B20 probes from those same groups.</text>
</svg>
